# Project override for bmad-dev-story.
# Loads voyager-skill-rules.md as persistent facts (informational) AND
# attaches an on_complete hook that fires at the workflow's terminal stage
# for the final NFR-tripwire check and the structured-completion handshake.
# See _bmad/custom/voyager-skill-rules.md for the rule set.
#
# Rule 5 (NFR tripwire response) is enforced *both* as a persistent fact
# the dev sees throughout (so they halt at the moment a tripwire surfaces,
# not at the end) AND as an on_complete verification (so even if the dev
# missed it mid-flow, the gate at completion catches the omission before
# the story is declared done).

[workflow]

persistent_facts = [
  "file:{project-root}/_bmad/custom/voyager-skill-rules.md",
]

# on_complete accepts a string scalar OR an array of instructions executed
# in order. Override wins (replaces the base empty string).
on_complete = [
  """
  Verify Rule 5 (NFR tripwire response) compliance: if any task in this story
  encountered an NFR that was unmeasurable, mathematically impossible, or
  internally contradictory, you must have halted, filed an amendment to the
  relevant planning artifact (prd.md / architecture.md / epics.md), documented
  the original-vs-amended wording in the Dev Agent Record, and proceeded
  against the amended NFR. If you find an NFR tripwire was worked around with
  code comments + deferred-work.md instead, stop and produce the amendment now
  before completing the story.
  """,
  """
  If invoked as a subagent under /epic-cycle (the calling context will include
  the literal phrase "Single-Task Agent (Task-in-Prompt Mode)" in the spawn
  prompt), follow Rule 4: send EXACTLY ONE STATUS: completed envelope to the
  team lead in the format specified in the rules file, then STOP. Do not call
  TaskList. Do not look for more work. Approve any shutdown request immediately.

  Populate FILES_MODIFIED with every file you created or modified (full paths
  from repo root). Populate DECISIONS with one-line summaries of any non-obvious
  implementation choices. Populate ISSUES_ENCOUNTERED with anything you had to
  resolve or surface (NFR tripwires, ADR-spec mismatches, environment gaps).

  If invoked directly by the user (no Task-in-Prompt Mode marker), emit a normal
  human-facing completion summary instead.
  """,
]
