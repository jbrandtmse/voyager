# 2026-05-23: 4-3 stays at review on 2026-05-23 (dev-4-3 cycle-6 smoke-driven follow-up / epic-cycle-2026-05-22-epic4) — cycle-5 lead-driven Chrome DevTools MCP smoke iter-2 confirmed cold-load replay works (Probe 4 PASS: Galilean moons in scene; replay fires upgradePlanetTexture(5) + addMoonsFor(5)) but Probe 3 still FAILED with "THREE.KTX2Loader: Missing initialization with `.detectSupport( renderer )`" for Jupiter and "[object Event]" load failures for all 4 moons. Network log captured zero KTX2 requests. Root cause: cycle-3 main.ts constructed TextureLoaderService with no arguments, hitting the no-renderer constructor branch that intentionally skips the canonical Three.js boilerplate `KTX2Loader.detectSupport(renderer)` call. Without it the loader doesn't know which Basis Universal transcode target the GPU supports and refuses to decode KTX2. Cycle-6 fix: wire engine.getRenderer() into the TextureLoaderService constructor in main.ts (renderer is available because engine.init(canvas) ran ~300 lines earlier); loosen TextureLoaderServiceOptions.renderer to `unknown` (mirror Story 3.3 SpacecraftModelsOptions pattern) so callers pass the engine's loose WebGLRendererLike without re-typing; cast at the detectSupport call site via `Parameters<typeof ktx2.detectSupport>[0]` (same shape spacecraft-models.ts uses). Basis transcoder bundle (basis_transcoder.{js,wasm}) was already on disk from Story 3.3 — no new procurement. 7 new tests in web/tests/ktx2-loader-init-defense.test.ts spying on KTX2Loader.prototype.detectSupport: called when service is constructed with {renderer}, called exactly once per instance, called with the supplied renderer, NOT called on default-construct path, NOT called when stub ktx2Loader is supplied (test-injection path); plus a source-grep defense against future main.ts refactors that drop the renderer wire-up. Web vitest 2685 / 2 skipped / 155 files (+7 from cycle-5 baseline 2678); bake fast pytest unchanged at 430/4/19; typecheck clean; lint 4 warnings baseline preserved. Both cycles 4 and 6 caught defects the test pyramid couldn't see (Lesson 8: "the test pyramid is necessary but not sufficient — the per-story smoke is the bridge from 'tests pass' to 'the product works'"). Lead routes to smoke iter-3 (expected iterations=3 defects_caught=2) followed by commit.
