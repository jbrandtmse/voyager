# Voyager baseline CI pipeline (Story 1.14).
#
# Triggers on every push to main and every PR targeting main. Runs lint,
# typecheck, bake (with determinism re-bake + SHA compare per NFR-R4),
# Layer-1 validation (NFR-P9), and the web vitest suite (Layer-3) in
# parallel where possible, gated by `needs:` edges. Builds `web/dist/`
# and deploys it to Cloudflare Pages on green-main pushes (ADR 0016).
#
# Load-bearing pins:
#   - `runs-on: ubuntu-22.04` — NFR-R4 byte-identical bake (CSPICE wheel
#     platform pin, architecture line 486).
#   - `actions/checkout@v4` with `lfs: true` — without LFS the kernels
#     and textures aren't pulled and the bake fails.
#   - Deploy job gated on `github.ref == 'refs/heads/main' &&
#     github.event_name == 'push'` — never deploys from PRs.
#
# Required GitHub repo secrets (must be set by the maintainer before the
# first push to main; see README → Deployment):
#   - CLOUDFLARE_API_TOKEN  (scoped to Pages:Edit)
#   - CLOUDFLARE_ACCOUNT_ID
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  deployments: write

jobs:
  # --- Lint -----------------------------------------------------------------
  lint-bake:
    name: lint (bake — ruff)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: bake/uv.lock
      - name: uv sync
        working-directory: bake
        run: uv sync --frozen
      - name: ruff check
        working-directory: bake
        run: uv run ruff check .

  lint-web:
    name: lint (web — eslint)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: eslint
        working-directory: web
        run: npm run lint

  # --- Typecheck ------------------------------------------------------------
  typecheck-web:
    name: typecheck (web — tsc --noEmit)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: tsc --noEmit
        working-directory: web
        run: npm run typecheck

  # --- Bake + determinism gate (NFR-R4) -------------------------------------
  bake:
    name: bake (VTRJ + determinism)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: bake/uv.lock
      - name: uv sync
        working-directory: bake
        run: uv sync --frozen
      - name: bake trajectories — first run
        working-directory: bake
        run: uv run python -m src.bake_trajectories
      - name: bake attitude — first run (Story 3.1)
        working-directory: bake
        run: uv run python -m src.ck_sample
      - name: snapshot SHA-256 of first bake outputs
        run: |
          cd bake/out
          find . -type f \( -name '*.bin*' -o -name 'manifest.json' \) | sort \
            | xargs sha256sum > ../../first-bake-shas.txt
          echo "--- first bake ---"
          cat ../../first-bake-shas.txt
      - name: bake trajectories — re-run for determinism
        working-directory: bake
        run: uv run python -m src.bake_trajectories
      - name: bake attitude — re-run for determinism
        working-directory: bake
        run: uv run python -m src.ck_sample
      - name: assert determinism (NFR-R4 byte-identical re-bake)
        run: |
          cd bake/out
          find . -type f \( -name '*.bin*' -o -name 'manifest.json' \) | sort \
            | xargs sha256sum > ../../second-bake-shas.txt
          echo "--- second bake ---"
          cat ../../second-bake-shas.txt
          diff -u first-bake-shas.txt second-bake-shas.txt
      - name: generate L2 attitude fixture (Story 3.7 AC1)
        working-directory: bake
        run: uv run python -m src.l2_attitude_validation
      - name: assert L2 fixture size cap (Story 3.7 AC4)
        run: |
          SIZE=$(stat -c '%s' bake/out/l2-attitude-fixture.json)
          echo "L2 fixture size: ${SIZE} bytes"
          test "$SIZE" -le 2097152 || (echo "L2 fixture exceeds 2 MB cap: ${SIZE}" && exit 1)
      - name: upload bake outputs
        uses: actions/upload-artifact@v4
        with:
          name: bake-out
          path: bake/out/
          retention-days: 7

  # --- L1 Python validation (NFR-P9) ----------------------------------------
  validate-l1:
    name: validate L1 (NFR-P9)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [bake]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: bake/uv.lock
      - name: uv sync
        working-directory: bake
        run: uv sync --frozen
      - name: download bake outputs
        uses: actions/download-artifact@v4
        with:
          name: bake-out
          path: bake/out/
      - name: validate L1
        working-directory: bake
        run: uv run python -m src.validate_l1
      - name: upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: bake/out/validation-report.md
          retention-days: 14

  # --- Bake test suite (fast tier) ------------------------------------------
  test-bake:
    name: test (bake — pytest fast)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: bake/uv.lock
      - name: uv sync
        working-directory: bake
        run: uv sync --frozen
      - name: pytest (fast tier — excludes @slow)
        working-directory: bake
        run: uv run pytest -m "not slow"

  # --- L3 web vitest (1276 tests) -------------------------------------------
  test-web:
    name: test (web — vitest L3)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [bake]  # Story 3.7 — L2 fixture + attitude VTRJ files come from bake job
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # committed L2 fixtures + .glb model are LFS-tracked
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: download bake outputs (Story 3.7 — L2 fixture + attitude VTRJ files)
        uses: actions/download-artifact@v4
        with:
          name: bake-out
          path: bake/out/
      - name: copy bake outputs to web/public/data (Story 3.7 AC3)
        run: |
          mkdir -p web/public/data
          cp bake/out/manifest.json web/public/data/manifest.json
          # Attitude + trajectory VTRJs needed by AttitudeService boot stack.
          cp bake/out/*.bin.br web/public/data/
          # L2 attitude fixture consumed by attitude-l2-fixture.test.ts.
          cp bake/out/l2-attitude-fixture.json web/public/data/l2-attitude-fixture.json
          ls -la web/public/data/ | head -40
      - name: vitest
        working-directory: web
        run: npm test

  # --- Story 3.3 AC2 — Voyager GLB LOD chain (gltf-transform + meshopt + KTX2)
  #
  # Runs `just bake-glb` (= `npm run build-glb`) inside `web/`. Produces
  # `web/public/models/voyager-lod{0..3}.<hash>.glb` + `bake/out/models-
  # manifest-fragment.json`. Requires `toktx` (Khronos KTX-Software CLI) on
  # PATH per ADR-0006 § Decision step 3 — UASTC baseColor + ETC1S AO.
  #
  # Install path on ubuntu-22.04: the official Khronos release is a .deb
  # under https://github.com/KhronosGroup/KTX-Software/releases. We pin a
  # specific version so CI is reproducible.
  build-glb:
    name: build-glb (Voyager LOD chain — Story 3.3 AC2)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # required to hydrate bake/inputs/models/voyager-raw.glb
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install toktx (Khronos KTX-Software v4.3.2)
        run: |
          KTX_VER=4.3.2
          curl -L -o /tmp/ktx.deb \
            "https://github.com/KhronosGroup/KTX-Software/releases/download/v${KTX_VER}/KTX-Software-${KTX_VER}-Linux-x86_64.deb"
          sudo apt-get update -qq
          sudo apt-get install -y /tmp/ktx.deb
          toktx --version
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: bake-glb (npm run build-glb)
        working-directory: web
        run: npm run build-glb
      - name: assert 4 LOD outputs landed
        run: |
          ls -la web/public/models/
          test $(ls web/public/models/voyager-lod0.*.glb 2>/dev/null | wc -l) -eq 1
          test $(ls web/public/models/voyager-lod1.*.glb 2>/dev/null | wc -l) -eq 1
          test $(ls web/public/models/voyager-lod2.*.glb 2>/dev/null | wc -l) -eq 1
          test $(ls web/public/models/voyager-lod3.*.glb 2>/dev/null | wc -l) -eq 1
          test -f bake/out/models-manifest-fragment.json
      - name: upload LOD outputs
        uses: actions/upload-artifact@v4
        with:
          name: voyager-lods
          path: |
            web/public/models/voyager-lod*.glb
            bake/out/models-manifest-fragment.json
          retention-days: 7

  # --- Vite build (content-hashed assets) -----------------------------------
  build:
    name: build (web — vite)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [typecheck-web, test-web, build-glb]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: download LOD outputs (from build-glb job)
        uses: actions/download-artifact@v4
        with:
          name: voyager-lods
          path: .
      - name: vite build
        working-directory: web
        run: npm run build
      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  # --- L4 Playwright visual regression (Story 4.9 — FR55) -------------------
  #
  # Runs the 9-scene visual-regression suite at `web/tests/visual/` against
  # the production build emitted by the `build` job. Catches any unintended
  # change to the rendered output before merge.
  #
  # Wall-clock budget: ≤ 3 minutes for the 9 scenes serially (NFR-M4 caps
  # L4+L5 total at 15 minutes; this job is the L4 half).
  #
  # On failure: uploads the `test-results/` artifact (diff PNGs + trace.zip)
  # so reviewers can inspect what diverged from the baseline.
  l4-visual-regression:
    name: L4 visual regression (Story 4.9 — FR55)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: download dist (production build)
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - name: install Playwright Chromium (pinned per @playwright/test version)
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: run L4 visual-regression suite
        working-directory: web
        run: npx playwright test --config tests/visual/playwright.config.ts
      - name: upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-l4-diffs
          path: |
            web/test-results/
            web/playwright-report/
          retention-days: 14

  # --- Deploy to Cloudflare Pages (main + push only) ------------------------
  #
  # Gated on `github.ref == 'refs/heads/main' && github.event_name == 'push'`
  # so PRs never trigger this job (Cloudflare's GitHub integration handles
  # PR preview deploys automatically — no workflow step needed). The
  # `needs:` edge transitively requires every fast-tier gate to be green
  # before deploy fires.
  deploy-cloudflare:
    name: deploy (Cloudflare Pages)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [lint-bake, lint-web, typecheck-web, bake, validate-l1, test-bake, test-web, build-glb, build, l4-visual-regression]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - name: deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: voyager
          directory: web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
